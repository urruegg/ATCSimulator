<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250" role="img" aria-label="ATCSimulator symbol">
  <defs><linearGradient id="pS" x1="0" y1="1" x2="1" y2="0">
    <stop offset="0" stop-color="#0E72B4"/><stop offset="0.5" stop-color="#1FA9D6"/><stop offset="1" stop-color="#22B07B"/>
  </linearGradient></defs>
  <path d="M46,212 C130,196 150,150 258,74" fill="none" stroke="url(#pS)" stroke-width="14" stroke-linecap="round"/>

  <!-- climbing aircraft -->
  <g transform="translate(205,104) rotate(-40)">
    <path d="M-20,-12 L22,0 L-20,12 L-9,0 Z" fill="#15324F"/>
    <path d="M-20,-12 L-9,0 L-20,12 Z" fill="#2C5E86"/>
  </g>

  <!-- Step 1: Swiss cross (flag) -->
  <circle cx="46" cy="212" r="18" fill="#E30613"/>
  <g transform="translate(46,212)"><rect x="-11" y="-4" width="22" height="8" rx="1.5" fill="#FFFFFF"/><rect x="-4" y="-11" width="8" height="22" rx="1.5" fill="#FFFFFF"/></g>

  <!-- Step 2: ATC control tower -->
  <circle cx="150" cy="146" r="30" fill="#0E72B4"/>
  <g transform="translate(150,146) scale(0.82)" fill="#FFFFFF">
    <circle cx="0" cy="-20" r="2.4"/><rect x="-1.4" y="-20" width="2.8" height="6" rx="1"/>
    <polygon points="-11,-13 11,-13 9,-5 -9,-5"/><rect x="-6" y="-5" width="12" height="3"/>
    <polygon points="-5,-2 5,-2 8,13 -8,13"/><rect x="-10" y="12" width="20" height="4" rx="1.5"/>
  </g>

  <!-- Step 3: cleared / qualified -->
  <circle cx="258" cy="74" r="38" fill="#22B07B"/>
  <g transform="translate(258,74) scale(1.5)"><path d="M-14,1 L-4,12 L15,-12" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></g>
</svg>
