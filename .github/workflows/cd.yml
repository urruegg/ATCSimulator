name: CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'infra/**'
      - '.github/workflows/cd.yml'
      - '.github/actions/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  LOCATION: swedencentral

jobs:
  deploy-shared:
    runs-on: ubuntu-latest
    # Reuse the 'sit' environment: it carries the OIDC federated credential
    # (subject repo:...:environment:sit) and the AZURE_* variables, and has no
    # reviewer gate. This job runs the RG-scoped shared platform template into
    # the pre-existing 'swissshub' RG (Azure DNS; Front Door stays off). The RG
    # is created once by scripts/bootstrap-cicd.ps1; CI holds only Contributor
    # on that RG (no subscription-scope role - least privilege).
    environment: sit
    concurrency: deploy-shared
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy shared platform (DNS + Front Door)
        shell: bash
        run: |
          az deployment group create \
            --resource-group swissshub \
            --template-file infra/shared/main.bicep \
            --name shared-platform

  deploy-sit:
    runs-on: ubuntu-latest
    environment: sit
    needs: deploy-shared
    concurrency: deploy-sit
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/deploy-environment
        with:
          environment: sit
          resource-group: rg-atcsim-sit
          fr24-token: ${{ secrets.FR24_TOKEN }}
          entra-client-id: ${{ vars.WEB_CLIENT_ID }}
          entra-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          api-scope: ${{ vars.API_SCOPE }}
          # Unset today -> empty -> per-app hostname fallback. Set post-cutover
          # to https://apisit.atcsim.swissshub.com.
          api-base-url: ${{ vars.API_BASE_URL }}

  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    needs: deploy-sit
    concurrency: deploy-prod
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/deploy-environment
        with:
          environment: prod
          resource-group: rg-atcsim-prod
          fr24-token: ${{ secrets.FR24_TOKEN }}
          entra-client-id: ${{ vars.WEB_CLIENT_ID }}
          entra-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          api-scope: ${{ vars.API_SCOPE }}
          # Unset today -> empty -> per-app hostname fallback. Set post-cutover
          # to https://api.atcsim.swissshub.com.
          api-base-url: ${{ vars.API_BASE_URL }}
