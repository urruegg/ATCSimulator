name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend tests
        run: |
          dotnet test tests/apis/AtcSim.FlightDataApi.Tests/AtcSim.FlightDataApi.Tests.csproj -c Release
          dotnet test tests/apis/AtcSim.VoiceAgentApi.Tests/AtcSim.VoiceAgentApi.Tests.csproj -c Release

      - name: Frontend tests and build
        working-directory: src/web/atcsim-shell
        run: |
          npm ci
          npm test
          npm run build

      - name: Bicep build
        run: az bicep build --file infra/main.bicep

      - name: Markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md"

  web-e2e:
    # Hermetic Playwright check: boots the web app and asserts the Azure map
    # loads and renders >=2 aircraft markers. Fully stubbed (Maps token + all
    # atlas.microsoft.com traffic + /api/aircraft) so it needs NO Azure
    # credentials and is safe on fork PRs. See src/web/atcsim-shell/e2e/.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web/atcsim-shell
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run web E2E (map + aircraft markers)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/web/atcsim-shell/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

