config:
  MD013: false   # line length — long tables/links are intentional
  MD033: false   # inline HTML allowed for mermaid/badges
  MD041: false   # first line need not be a top-level heading (header tables)
globs:
  - "**/*.md"
ignores:
  - "node_modules"
  - "**/node_modules/**"
  - "**/dist/**"
